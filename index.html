<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Guilherme | Dev & Data Analytics</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { line-height: 1.6; color: #94a3b8; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            text-decoration: none;
            background: #38bdf8;
            color: #0f172a;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }
        .btn-git {
            background: #334155;
            color: white;
        }
        .btn-git:hover { background: #475569; }
        .tag {
            display: inline-block;
            background: #0ea5e922;
            color: #38bdf8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <span class="tag">Disponível para Estágio</span>
    <h1>João Guilherme</h1>
    <p>Estudante de ADS (4º Período) focado em Python, SQL e automação de processos. Desenvolvo soluções que transformam dados brutos em decisões estratégicas.</p>
    
    <div class="links">
        <a href="https://github.com/joao-guilherme438/media-performance-analytics" class="btn" target="_blank">🚀 Ver Projeto: WPP Media Tool</a>
        <a href="https://github.com/joao-guilherme438" class="btn btn-git" target="_blank">📂 Meu GitHub Completo</a>
        <a href="https://www.linkedin.com/in/SEU-PERFIL" class="btn btn-git" target="_blank">💼 Conectar no LinkedIn</a>
    </div>
</div>

</body>
</html>
